name: Update Wiki Stats and Charts
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests pandas matplotlib
      - name: Run update script
        run: python update_stats.py
      - name: Commit and Push
        run: |
          git config --global user.name 'WikiStatsBot'
          git config --global user.email 'bot@noreply.github.com'
          git add stats.csv stats.png
          git commit -m "Päivitetty tilastot ja graafit" || exit 0
          git push
